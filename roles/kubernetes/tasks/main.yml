---
- name: Install kernel-modules-extra
  ansible.builtin.dnf:
    name: kernel-modules-extra
    state: present
  register: kernel_modules_extra_result

- name: Reboot after kernel-modules-extra install
  ansible.builtin.reboot:
    reboot_timeout: 600
    test_command: whoami
  when: kernel_modules_extra_result.changed

- name: Disable swap
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: ansible_swaptotal_mb > 0

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(.*\sswap\s+.*)$'
    replace: '# \1'

- name: Ensure kernel module config directory exists
  ansible.builtin.file:
    path: /etc/modules-load.d
    state: directory
    mode: '0755'

- name: Create Kubernetes kernel modules config
  ansible.builtin.copy:
    dest: /etc/modules-load.d/kubernetes.conf
    mode: '0644'
    content: |
      overlay
      br_netfilter

- name: Load overlay module
  ansible.builtin.command: modprobe overlay
  changed_when: false

- name: Load br_netfilter module
  ansible.builtin.command: modprobe br_netfilter
  changed_when: false

- name: Ensure sysctl config directory exists
  ansible.builtin.file:
    path: /etc/sysctl.d
    state: directory
    mode: '0755'

- name: Create Kubernetes sysctl config
  ansible.builtin.copy:
    dest: /etc/sysctl.d/kubernetes.conf
    mode: '0644'
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Add Docker repository
  ansible.builtin.command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo

- name: Install containerd
  ansible.builtin.dnf:
    name: containerd.io
    state: present

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Check if containerd config exists
  ansible.builtin.stat:
    path: /etc/containerd/config.toml
  register: containerd_config_stat

- name: Check if containerd config has version header
  ansible.builtin.command: grep -q '^version = $' /etc/containerd/config.toml
  register: containerd_header_check
  failed_when: false
  changed_when: false
  when: containerd_config_stat.stat.exists

- name: Generate default containerd config when missing or invalid
  ansible.builtin.shell: |
    containerd config default > /etc/containerd/config.toml
  args:
    executable: /bin/bash
  when: >
    (not containerd_config_stat.stat.exists) or
    (containerd_config_stat.stat.exists and containerd_header_check.rc != 0)
  notify: Restart containerd

- name: Ensure CRI plugin is enabled in containerd config
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: '^disabled_plugins\s*=\s*\["cri"\]\s*$'
    replace: '# disabled_plugins = ["cri"]'
  notify: Restart containerd

- name: Set SystemdCgroup true in containerd config
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

- name: Enable and start containerd
  ansible.builtin.service:
    name: containerd
    state: started
    enabled: true

- name: Flush handlers so containerd is restarted before kubelet work
  ansible.builtin.meta: flush_handlers

- name: Add Kubernetes repo
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/kubernetes.repo
    mode: '0644'
    content: |
      [kubernetes]
      name=Kubernetes
      baseurl=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/
      enabled=1
      gpgcheck=1
      gpgkey=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/repodata/repomd.xml.key

- name: Install Kubernetes packages
  ansible.builtin.dnf:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present
    disable_excludes: kubernetes

- name: Enable kubelet
  ansible.builtin.service:
    name: kubelet
    enabled: true
    state: started

- name: Run control plane tasks
  ansible.builtin.import_tasks: control_plane.yml
  when: inventory_hostname in groups['kubernetes_control_plane']

- name: Install Flannel CNI on control plane
  ansible.builtin.import_tasks: cni_flannel.yml
  when: inventory_hostname in groups['kubernetes_control_plane']

- name: Run worker tasks
  ansible.builtin.import_tasks: worker.yml
  when: inventory_hostname in groups['kubernetes_workers']

- name: Wait for all cluster nodes to become Ready
  ansible.builtin.command: >
    kubectl --kubeconfig /etc/kubernetes/admin.conf
    wait --for=condition=Ready nodes --all --timeout=180s
  when: inventory_hostname == groups['kubernetes_control_plane'][0]
  changed_when: false

- name: Wait for CoreDNS deployment rollout
  ansible.builtin.command: >
    kubectl --kubeconfig /etc/kubernetes/admin.conf
    rollout status deployment/coredns
    -n kube-system
    --timeout=180s
  when: inventory_hostname == groups['kubernetes_control_plane'][0]
  changed_when: false