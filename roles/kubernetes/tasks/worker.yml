---
- name: Get join command from control plane
  ansible.builtin.command: kubeadm token create --print-join-command
  register: kubernetes_join_command_raw
  delegate_to: "{{ groups['kubernetes_control_plane'][0] }}"
  run_once: true

- name: Store join command on control plane hostvars
  ansible.builtin.set_fact:
    kubernetes_join_command: "{{ kubernetes_join_command_raw.stdout }}"
  delegate_to: "{{ groups['kubernetes_control_plane'][0] }}"
  delegate_facts: true
  run_once: true

- name: Join worker to cluster
  ansible.builtin.command: "{{ hostvars[groups['kubernetes_control_plane'][0]].kubernetes_join_command }}"
  args:
    creates: /etc/kubernetes/kubelet.conf