---
- name: Wait for Kubernetes API server before Flannel install
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get nodes
  register: kubectl_ready_for_cni
  retries: 20
  delay: 20
  until: kubectl_ready_for_cni.rc == 0
  changed_when: false

- name: Copy flannel manifest
  ansible.builtin.copy:
    src: kube-flannel.yml
    dest: /tmp/kube-flannel.yml
    mode: '0644'

- name: Install flannel CNI
  ansible.builtin.command: kubectl apply -f /tmp/kube-flannel.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: flannel_apply
  changed_when: "'created' in flannel_apply.stdout"

- name: Wait for Flannel DaemonSet rollout
  ansible.builtin.command: >
    kubectl --kubeconfig /etc/kubernetes/admin.conf
    rollout status daemonset/kube-flannel-ds
    -n kube-flannel
    --timeout=300s
  changed_when: false

- name: Wait for CoreDNS pods to become Ready
  ansible.builtin.command: >
    kubectl --kubeconfig /etc/kubernetes/admin.conf
    wait --for=condition=Ready
    pod -l k8s-app=kube-dns
    -n kube-system
    --timeout=300s
  changed_when: false