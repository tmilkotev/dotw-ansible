- name: Wait for Kubernetes API server before Flannel install
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get nodes
  register: kubectl_ready_for_cni
  retries: 20
  delay: 10
  until: kubectl_ready_for_cni.rc == 0
  changed_when: false

- name: Copy flannel manifest
  ansible.builtin.copy:
    src: kube-flannel.yml
    dest: /tmp/kube-flannel.yml
    mode: '0644'

- name: Install flannel CNI
  ansible.builtin.command: kubectl apply -f /tmp/kube-flannel.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: flannel_apply
  changed_when: "'created' in flannel_apply.stdout or 'configured' in flannel_apply.stdout"

- name: Wait for kube-flannel namespace to exist
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get ns kube-flannel
  register: flannel_ns_ready
  retries: 20
  delay: 5
  until: flannel_ns_ready.rc == 0
  changed_when: false