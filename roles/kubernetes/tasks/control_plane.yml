---
- name: Stop kubelet before phased kubeadm bootstrap
  ansible.builtin.service:
    name: kubelet
    state: stopped

- name: Ensure Kubernetes manifests directory exists
  ansible.builtin.file:
    path: /etc/kubernetes/manifests
    state: directory
    mode: '0755'

- name: Generate Kubernetes PKI
  ansible.builtin.command: kubeadm init phase certs all --apiserver-advertise-address={{ ansible_host }}
  args:
    creates: /etc/kubernetes/pki/ca.crt

- name: Generate Kubernetes kubeconfig files
  ansible.builtin.command: kubeadm init phase kubeconfig all --apiserver-advertise-address={{ ansible_host }}
  args:
    creates: /etc/kubernetes/admin.conf

- name: Generate local etcd static pod manifest
  ansible.builtin.command: kubeadm init phase etcd local --apiserver-advertise-address={{ ansible_host }}
  args:
    creates: /etc/kubernetes/manifests/etcd.yaml

- name: Generate control-plane static pod manifests
  ansible.builtin.command: kubeadm init phase control-plane all --apiserver-advertise-address={{ ansible_host }}
  args:
    creates: /etc/kubernetes/manifests/kube-apiserver.yaml

- name: Patch etcd initialDelaySeconds
  ansible.builtin.replace:
    path: /etc/kubernetes/manifests/etcd.yaml
    regexp: '(^\s+initialDelaySeconds:\s+)10$'
    replace: '\g<1>90'

- name: Patch etcd periodSeconds
  ansible.builtin.replace:
    path: /etc/kubernetes/manifests/etcd.yaml
    regexp: '(^\s+periodSeconds:\s+)10$'
    replace: '\g<1>60'

- name: Patch kube-apiserver initialDelaySeconds
  ansible.builtin.replace:
    path: /etc/kubernetes/manifests/kube-apiserver.yaml
    regexp: '(^\s+initialDelaySeconds:\s+)10$'
    replace: '\g<1>90'

- name: Patch kube-apiserver periodSeconds
  ansible.builtin.replace:
    path: /etc/kubernetes/manifests/kube-apiserver.yaml
    regexp: '(^\s+periodSeconds:\s+)10$'
    replace: '\g<1>60'

- name: Patch kube-controller-manager initialDelaySeconds
  ansible.builtin.replace:
    path: /etc/kubernetes/manifests/kube-controller-manager.yaml
    regexp: '(^\s+initialDelaySeconds:\s+)10$'
    replace: '\g<1>90'

- name: Patch kube-controller-manager periodSeconds
  ansible.builtin.replace:
    path: /etc/kubernetes/manifests/kube-controller-manager.yaml
    regexp: '(^\s+periodSeconds:\s+)10$'
    replace: '\g<1>60'

- name: Patch kube-scheduler initialDelaySeconds
  ansible.builtin.replace:
    path: /etc/kubernetes/manifests/kube-scheduler.yaml
    regexp: '(^\s+initialDelaySeconds:\s+)10$'
    replace: '\g<1>90'

- name: Patch kube-scheduler periodSeconds
  ansible.builtin.replace:
    path: /etc/kubernetes/manifests/kube-scheduler.yaml
    regexp: '(^\s+periodSeconds:\s+)10$'
    replace: '\g<1>60'

- name: Start kubelet after manifest patching
  ansible.builtin.service:
    name: kubelet
    state: started
    enabled: true

- name: Wait for Kubernetes API server
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get nodes
  register: kubectl_ready
  retries: 30
  delay: 20
  until: kubectl_ready.rc == 0
  changed_when: false

- name: Create bootstrap token
  ansible.builtin.command: kubeadm init phase bootstrap-token
  changed_when: false

- name: Upload kubeadm cluster configuration
  ansible.builtin.command: kubeadm init phase upload-config all
  changed_when: false

- name: Mark node as control-plane
  ansible.builtin.command: kubeadm init phase mark-control-plane
  changed_when: false

- name: Install CoreDNS addon
  ansible.builtin.command: kubeadm init phase addon coredns
  changed_when: false

- name: Install kube-proxy addon
  ansible.builtin.command: kubeadm init phase addon kube-proxy
  changed_when: false

- name: Create .kube directory
  ansible.builtin.file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0755'

- name: Copy admin kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    remote_src: true
    owner: vagrant
    group: vagrant
    mode: '0644'