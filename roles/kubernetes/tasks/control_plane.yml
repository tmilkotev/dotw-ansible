---
- name: Create kubeadm patches directory
  ansible.builtin.file:
    path: /etc/kubernetes/patches
    state: directory
    mode: '0755'

- name: Copy kubeadm patch files
  ansible.builtin.copy:
    src: "kubeadm/{{ item }}"
    dest: "/etc/kubernetes/patches/{{ item }}"
    mode: '0644'
  loop:
    - etcd+merge.yaml
    - kube-apiserver+merge.yaml
    - kube-controller-manager+merge.yaml
    - kube-scheduler+merge.yaml

- name: Render kubeadm init config
  ansible.builtin.template:
    src: kubeadm-init-config.yaml.j2
    dest: /etc/kubernetes/kubeadm-init-config.yaml
    mode: '0644'

- name: Initialize Kubernetes control plane
  ansible.builtin.command: kubeadm init --config /etc/kubernetes/kubeadm-init-config.yaml
  args:
    creates: /etc/kubernetes/admin.conf

- name: Create .kube directory
  ansible.builtin.file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0755'

- name: Copy admin kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    remote_src: true
    owner: vagrant
    group: vagrant
    mode: '0644'

- name: Wait for Kubernetes API server
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get nodes
  register: kubectl_ready
  retries: 20
  delay: 10
  until: kubectl_ready.rc == 0
  changed_when: false