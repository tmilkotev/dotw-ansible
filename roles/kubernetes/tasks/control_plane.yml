---
- name: Copy kubeadm config
  ansible.builtin.copy:
    src: kubeadm-config.yaml
    dest: /root/kubeadm-config.yaml
    mode: '0600'

- name: Initialize Kubernetes control plane
  ansible.builtin.command: kubeadm init --config /root/kubeadm-config.yaml
  args:
    creates: /etc/kubernetes/admin.conf
  register: kubeadm_init_result

- name: Create .kube directory for vagrant
  ansible.builtin.file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0755'

- name: Copy admin kubeconfig for vagrant
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    remote_src: true
    owner: vagrant
    group: vagrant
    mode: '0600'

- name: Wait for Kubernetes API server to respond
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/healthz
  register: kubectl_ready
  retries: 30
  delay: 10
  until: kubectl_ready.rc == 0 and 'ok' in kubectl_ready.stdout
  changed_when: false