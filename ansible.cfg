# ansible.cfg

[defaults]
inventory = inventories                 # default inventory directory
roles_path = roles                      # where Ansible looks for roles
collections_paths = collections         # where Ansible collections are installed
stdout_callback = yaml                  # cleaner YAML-style output
bin_ansible_callbacks = True            # enable callback plugins for CLI tools
host_key_checking = False               # disable SSH host key verification (useful for labs)
retry_files_enabled = False             # disable creation of *.retry files
interpreter_python = auto_silent        # auto-detect Python interpreter on remote hosts
timeout = 30                            # SSH connection timeout in seconds

[ssh_connection]
pipelining = True                       # reduces SSH overhead for faster execution
control_path = ~/.ssh/ansible-%%r@%%h:%%p   # enables SSH connection reuse